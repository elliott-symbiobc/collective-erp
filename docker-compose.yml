services:

  traefik:
    image: traefik:v3.0
    container_name: collective_traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "${TRAEFIK_PORT:-8080}:80"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - collective_net

  postgres:
    image: pgvector/pgvector:pg16
    container_name: collective_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: collective
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: collective_erp
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./sql/views.sql:/docker-entrypoint-initdb.d/02_views.sql
      - ./sql/seed_market_prices.sql:/docker-entrypoint-initdb.d/03_seed.sql
    networks:
      - collective_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collective -d collective_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: collective_redis
    restart: unless-stopped
    networks:
      - collective_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: collective_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://collective:${DB_PASSWORD}@postgres:5432/collective_erp
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-}
      PLAID_SANDBOX_SECRET: ${PLAID_SANDBOX_SECRET:-}
      PLAID_PRODUCTION_SECRET: ${PLAID_PRODUCTION_SECRET:-}
      PLAID_ENV: ${PLAID_ENV:-sandbox}
      QBO_CLIENT_ID: ${QBO_CLIENT_ID:-}
      QBO_CLIENT_SECRET: ${QBO_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RAG_ENABLED: ${RAG_ENABLED:-true}
    volumes:
      - ./reports:/app/reports
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - collective_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${APP_DOMAIN:-localhost}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  worker:
    build: ./api
    container_name: collective_worker
    restart: unless-stopped
    command: celery -A app.worker worker --loglevel=info --beat --max-tasks-per-child=50
    environment:
      DATABASE_URL: postgresql://collective:${DB_PASSWORD}@postgres:5432/collective_erp
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-}
      PLAID_SANDBOX_SECRET: ${PLAID_SANDBOX_SECRET:-}
      PLAID_PRODUCTION_SECRET: ${PLAID_PRODUCTION_SECRET:-}
      PLAID_ENV: ${PLAID_ENV:-sandbox}
      QBO_CLIENT_ID: ${QBO_CLIENT_ID:-}
      QBO_CLIENT_SECRET: ${QBO_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RAG_ENABLED: ${RAG_ENABLED:-true}
    volumes:
      - ./reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - collective_net

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: collective_frontend
    restart: unless-stopped
    command: node_modules/.bin/next dev
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      API_URL: http://api:8000/api
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api
    networks:
      - collective_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${APP_DOMAIN:-localhost}`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      - "traefik.http.routers.frontend-proxy.rule=Host(`${APP_DOMAIN:-localhost}`) && (PathPrefix(`/api/proxy`) || PathPrefix(`/api/auth`) || PathPrefix(`/api/logo`))"
      - "traefik.http.routers.frontend-proxy.entrypoints=web"
      - "traefik.http.routers.frontend-proxy.service=frontend"

networks:
  collective_net:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
  frontend_node_modules:
